<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>YOLO Vision AI Dashboard</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#0f172a;
    color:white;
}

.container{
    display:flex;
    min-height:100vh;
}

/* Sidebar */

.sidebar{
    width:260px;
    background:#111827;
    border-right:1px solid #1f2937;
    padding:20px;
}

.logo{
    font-size:24px;
    font-weight:bold;
    color:#60a5fa;
    margin-bottom:30px;
}

.menu-item{
    padding:15px;
    margin-bottom:10px;
    border-radius:10px;
    background:#1e293b;
    cursor:pointer;
}

.menu-item:hover{
    background:#2563eb;
}

/* Main */

.main{
    flex:1;
    padding:30px;
}

.header{
    margin-bottom:25px;
}

.header h1{
    font-size:32px;
}

.header p{
    color:#94a3b8;
    margin-top:8px;
}

/* Cards */

.cards{
    display:flex;
    gap:20px;
    margin-bottom:30px;
}

.card{
    flex:1;
    background:#1e293b;
    padding:20px;
    border-radius:15px;
}

.card h3{
    color:#94a3b8;
    margin-bottom:10px;
}

.card p{
    font-size:28px;
    font-weight:bold;
}

/* Upload */

.upload-box{
    background:#1e293b;
    padding:25px;
    border-radius:15px;
    margin-bottom:30px;
}

input[type=file]{
    width:100%;
    padding:15px;
    background:#0f172a;
    border:1px solid #334155;
    color:white;
    border-radius:10px;
}

.preview{
    margin-top:20px;
    text-align:center;
}

.preview img{
    max-width:500px;
    max-height:400px;
    border-radius:10px;
    display:none;
}

.detect-btn{
    width:100%;
    margin-top:20px;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    font-size:16px;
    cursor:pointer;
}

.detect-btn:hover{
    background:#1d4ed8;
}

/* Status */

.status{
    margin-top:15px;
    padding:10px;
    border-radius:10px;
    display:none;
}

.success{
    background:#14532d;
}

.error{
    background:#7f1d1d;
}

/* Results */

.results{
    background:#1e293b;
    padding:25px;
    border-radius:15px;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#2563eb;
    padding:12px;
}

td{
    padding:12px;
    border-bottom:1px solid #334155;
}

.no-results{
    text-align:center;
    padding:30px;
    color:#94a3b8;
}

.loading{
    display:none;
    text-align:center;
    margin-top:20px;
    color:#60a5fa;
}

@media(max-width:900px){

    .container{
        flex-direction:column;
    }

    .sidebar{
        width:100%;
    }

    .cards{
        flex-direction:column;
    }

}

</style>
</head>

<body>

<div class="container">

    <div class="sidebar">

        <div class="logo">
            🎯 YOLO Vision AI
        </div>

        <div class="menu-item">
            Dashboard
        </div>

        <div class="menu-item">
            Model Status
        </div>

        <div class="menu-item">
            Detection Results
        </div>

    </div>

    <div class="main">

        <div class="header">

            <h1>YOLO Object Detection</h1>

            <p>
                Upload an image and run detection using your Flask API
            </p>

        </div>

        <div class="cards">

            <div class="card">
                <h3>Backend</h3>
                <p>Flask</p>
            </div>

            <div class="card">
                <h3>Model</h3>
                <p>YOLO</p>
            </div>

            <div class="card">
                <h3>Status</h3>
                <p id="statusText">Ready</p>
            </div>

        </div>

        <div class="upload-box">

            <form id="detectForm">

                <input
                    type="file"
                    id="image"
                    name="image"
                    accept="image/*"
                    required>

                <div class="preview">
                    <img id="previewImage">
                </div>

                <button
                    type="submit"
                    class="detect-btn">

                    🚀 Run Detection

                </button>

            </form>

            <div
                id="loading"
                class="loading">

                Running YOLO Detection...

            </div>

            <div
                id="statusMessage"
                class="status">
            </div>

        </div>

        <div class="results">

            <h2 style="margin-bottom:20px;">
                Detection Results
            </h2>

            <table>

                <thead>

                    <tr>
                        <th>Class</th>
                        <th>Confidence</th>
                    </tr>

                </thead>

                <tbody id="resultsBody">

                    <tr>

                        <td
                            colspan="2"
                            class="no-results">

                            No detections yet

                        </td>

                    </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

<script>

const imageInput =
document.getElementById("image");

const previewImage =
document.getElementById("previewImage");

imageInput.addEventListener(
"change",
function(){

    const file =
    this.files[0];

    if(file){

        previewImage.src =
        URL.createObjectURL(file);

        previewImage.style.display =
        "block";

    }

});

document
.getElementById("detectForm")
.addEventListener(
"submit",
async function(e){

    e.preventDefault();

    const file =
    imageInput.files[0];

    if(!file){

        alert(
        "Select an image first."
        );

        return;
    }

    const formData =
    new FormData();

    formData.append(
        "image",
        file
    );

    const loading =
    document.getElementById(
        "loading"
    );

    const statusMessage =
    document.getElementById(
        "statusMessage"
    );

    const statusText =
    document.getElementById(
        "statusText"
    );

    loading.style.display =
    "block";

    statusText.innerText =
    "Running";

    try{

        const response =
        await fetch(
            "/detect",
            {
                method:"POST",
                body:formData
            }
        );

        const data =
        await response.json();

        loading.style.display =
        "none";

        const tbody =
        document.getElementById(
            "resultsBody"
        );

        tbody.innerHTML = "";

        if(data.error){

            statusMessage.style.display =
            "block";

            statusMessage.className =
            "status error";

            statusMessage.innerText =
            data.error;

            statusText.innerText =
            "Error";

            return;
        }

        statusMessage.style.display =
        "block";

        statusMessage.className =
        "status success";

        statusMessage.innerText =
        "Detection completed successfully.";

        statusText.innerText =
        "Success";

        if(data.length === 0){

            tbody.innerHTML =

            `<tr>
                <td colspan="2">
                    No objects detected
                </td>
            </tr>`;

        }else{

            data.forEach(
            item => {

                tbody.innerHTML +=

                `<tr>
                    <td>${item.class}</td>
                    <td>${item.confidence.toFixed(4)}</td>
                </tr>`;

            });

        }

    }

    catch(error){

        loading.style.display =
        "none";

        statusText.innerText =
        "Failed";

        statusMessage.style.display =
        "block";

        statusMessage.className =
        "status error";

        statusMessage.innerText =
        "Cannot connect to Flask backend.";

        console.error(error);

    }

});

</script>

</body>
</html>
